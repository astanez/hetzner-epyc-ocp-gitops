apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-directory-sync
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/astanez/hetzner-epyc-ocp-gitops.git' # Replace with your repo URL
    targetRevision: HEAD
    path: minio
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: minio-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true