apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-console
  namespace: minio-storage
spec:
  to:
    kind: Service
    name: minio
  port:
    targetPort: console
  tls:
    termination: edge
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-s3-api
  namespace: minio-storage
spec:
  to:
    kind: Service
    name: minio
  port:
    targetPort: s3-api
  tls:
    termination: edge